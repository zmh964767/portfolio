<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到 | Zerobyheart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        stone: {
                            50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e4',
                            300: '#d6d3d1', 400: '#a8a29e', 500: '#78716c',
                            600: '#57534e', 700: '#44403c', 800: '#292524',
                            850: '#1c1917', 900: '#1a1816', 950: '#0c0a09'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0c0a09; color: #d6d3d1; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
        .gradient-text {
            background: linear-gradient(135deg, #e7e5e4 0%, #d6d3d1 25%, #a8a29e 50%, #78716c 75%, #57534e 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        .float { animation: float 6s ease-in-out infinite; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="text-center px-6">
        <p class="text-stone-500 text-sm tracking-[0.3em] uppercase mb-8">404 Error</p>
        <h1 class="text-8xl md:text-[12rem] font-bold gradient-text mb-8 float">404</h1>
        <p class="text-stone-400 text-xl md:text-2xl mb-12">页面未找到</p>
        <a href="/" class="glass rounded-full px-12 py-6 text-stone-300 hover:text-white transition-all duration-300 inline-block">
            返回首页
        </a>
    </div>
</body>
</html>
